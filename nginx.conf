server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # SPA: todas las rutas caen en index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache assets con hash en el nombre
  location ~* \.(js|css|woff2|png|svg|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
